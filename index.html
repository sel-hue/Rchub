const PAv=({user,size=40,style={}})=>{
  const pic=user?.user_metadata?.avatar_url;
  const init=((user?.user_metadata?.full_name||user?.email||"?")).slice(0,2).toUpperCase();
  if(pic)return<img src={pic} alt="av" style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",flexShrink:0,...style}}/>;
  return<Av initials={init} size={size} style={style}/>;
};

const Btn=({children,onClick,v="primary",sz="md",style={},disabled=false})=>{
  const sz2={sm:{padding:"6px 14px",fontSize:13},md:{padding:"10px 20px",fontSize:14},lg:{padding:"14px 26px",fontSize:15}};
  const vr={
    primary:{background:`linear-gradient(135deg,${C.navy},${C.navyDark})`,color:"#fff",boxShadow:"0 4px 14px rgba(10,61,145,0.28)"},
    green:{background:`linear-gradient(135deg,${C.green},${C.greenDark})`,color:"#fff",boxShadow:"0 4px 14px rgba(22,163,74,0.28)"},
    outline:{background:"transparent",color:C.navy,border:`2px solid ${C.navy}`},
    gold:{background:`linear-gradient(135deg,${C.gold},#e5a800)`,color:C.dark,boxShadow:"0 4px 14px rgba(242,194,48,0.35)"},
    teal:{background:"linear-gradient(135deg,#007A6A,#005A4F)",color:"#fff"},
    woutline:{background:"transparent",color:"#fff",border:"2px solid rgba(255,255,255,0.38)"},
    danger:{background:"linear-gradient(135deg,#ef4444,#b91c1c)",color:"#fff"},
    ghost:{background:"rgba(0,0,0,0.06)",color:C.dark,border:"none"},
    red:{background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca"},
  };
  return<button disabled={disabled} onClick={disabled?undefined:onClick}
    style={{fontFamily:"Poppins",fontWeight:600,border:"none",cursor:disabled?"not-allowed":"pointer",
      borderRadius:10,transition:"all 0.2s",display:"inline-flex",alignItems:"center",gap:6,
      ...sz2[sz],...vr[v],opacity:disabled?0.55:1,...style}}>{children}</button>;
};

// ── NOTIFICATIONS PAGE ────────────────────────────────────────────────────────
const NotifPage=({user})=>{
  const{t}=useLang();
  const[notifs,setNotifs]=useState([]);
  const[loading,setLoading]=useState(true);
  const load=async()=>{
    if(!user){setLoading(false);return;}
    setLoading(true);
    const isAdmin=user.email===ADMIN_EMAIL;
    let q=supabase.from("hire_requests").select("*").order("created_at",{ascending:false});
    if(!isAdmin)q=q.eq("provider_email",user.email);
    const{data}=await q;
    setNotifs(data||[]);
    setLoading(false);
  };
  useEffect(()=>{
    load();
    if(!user)return;
    const ch=supabase.channel("hr-live").on("postgres_changes",{event:"INSERT",schema:"public",table:"hire_requests"},load).subscribe();
    return()=>supabase.removeChannel(ch);
  },[user]);
  const markRead=async(id)=>{
    await supabase.from("hire_requests").update({read:true}).eq("id",id);
    setNotifs(n=>n.map(x=>x.id===id?{...x,read:true}:x));
  };
  const markAll=async()=>{
    const ids=notifs.filter(n=>!n.read).map(n=>n.id);
    if(!ids.length)return;
    await supabase.from("hire_requests").update({read:true}).in("id",ids);
    setNotifs(n=>n.map(x=>({...x,read:true})));
  };
  if(!user)return(
    <div style={{textAlign:"center",padding:"80px 20px 120px"}}>
      <div style={{fontSize:54,marginBottom:16}}>🔔</div>
      <h2 style={{fontSize:20,fontWeight:800,color:C.dark,marginBottom:10}}>Sign in to view notifications</h2>
    </div>
  );
  const unread=notifs.filter(n=>!n.read).length;
  return(
    <div className="fade-in" style={{maxWidth:680,margin:"0 auto",padding:"32px 20px 120px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
        <div>
          <h1 style={{fontSize:22,fontWeight:800,color:C.dark}}>🔔 {t("notifications")}</h1>
          {unread>0&&<span style={{background:"#fef2f2",color:"#ef4444",fontSize:12,fontWeight:600,padding:"2px 10px",borderRadius:20}}>{unread} {t("unread")}</span>}
        </div>
        {unread>0&&<Btn sz="sm" v="ghost" onClick={markAll}>{t("markRead")} all</Btn>}
      </div>
      {loading?<Spinner/>:notifs.length===0?(
        <Card style={{textAlign:"center",padding:"48px 22px"}}>
          <div style={{fontSize:48,marginBottom:12}}>📭</div>
          <p style={{color:C.gray,fontSize:14}}>{t("noNotifs")}</p>
        </Card>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {notifs.map(n=>(
            <Card key={n.id} style={{borderLeft:`4px solid ${n.read?C.grayLight:C.green}`,background:n.read?"#fff":"#f0fdf4"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div style={{display:"flex",gap:10,alignItems:"center"}}>
                  <div style={{width:38,height:38,borderRadius:"50%",background:`linear-gradient(135deg,${C.green},${C.greenDark})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>🤝</div>
                  <div>
                    <div style={{fontWeight:700,fontSize:13,color:C.dark}}>{t("hireReqFrom")}</div>
                    <div style={{fontSize:12,color:C.gray}}>{new Date(n.created_at).toLocaleString()}</div>
                  </div>
                </div>
                {!n.read&&<Btn sz="sm" v="ghost" onClick={()=>markRead(n.id)} style={{fontSize:11}}>{t("markRead")}</Btn>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,padding:"10px 14px",background:"#f8fafc",borderRadius:10}}>
                <div><div style={{fontSize:11,color:C.gray,fontWeight:600,marginBottom:2}}>{t("customerName")}</div><div style={{fontSize:13,fontWeight:700,color:C.dark}}>{n.customer_name}</div></div>
                <div><div style={{fontSize:11,color:C.gray,fontWeight:600,marginBottom:2}}>{t("customerPhone")}</div><a href={`tel:${n.customer_phone}`} style={{fontSize:13,fontWeight:700,color:C.navy,textDecoration:"none"}}>{n.customer_phone}</a></div>
                {n.customer_email&&<div><div style={{fontSize:11,color:C.gray,fontWeight:600,marginBottom:2}}>{t("customerEmail")}</div><div style={{fontSize:12,color:C.dark,wordBreak:"break-all"}}>{n.customer_email}</div></div>}
                {n.provider_name&&<div><div style={{fontSize:11,color:C.gray,fontWeight:600,marginBottom:2}}>Provider</div><div style={{fontSize:12,color:C.dark}}>{n.provider_name}</div></div>}
              </div>
              {n.message&&<div style={{marginTop:10,padding:"8px 12px",background:"#fff",borderRadius:8,border:`1px solid ${C.grayLight}`}}>
                <div style={{fontSize:11,color:C.gray,fontWeight:600,marginBottom:3}}>{t("message")}</div>
                <div style={{fontSize:13,color:C.dark,lineHeight:1.5}}>{n.message}</div>
              </div>}
            </Card>
          ))}
        </div>
      )}
    </div>
  );

// ── ACCOUNT PAGE — full panel for all users ───────────────────────────────────
const AccountPage=({user,setUser,setPage})=>{
  const{t,lang}=useLang();
  const[tab,setTab]=useState("profile");
  const[name,setName]=useState(user?.user_metadata?.full_name||"");
  const[avatarFile,setAvatarFile]=useState(null);
  const[avatarPreview,setAvatarPreview]=useState(user?.user_metadata?.avatar_url||null);
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState("");
  const[err,setErr]=useState("");
  const[cp,setCp]=useState("");const[np,setNp]=useState("");const[np2,setNp2]=useState("");
  const[passMsg,setPassMsg]=useState("");const[passErr,setPassErr]=useState("");
  const[delConfirm,setDelConfirm]=useState("");
  const[hires,setHires]=useState([]);const[hiresLoading,setHiresLoading]=useState(false);
  const[myProvider,setMyProvider]=useState(null);const[provLoading,setProvLoading]=useState(false);
  const fileRef=useRef();

  useEffect(()=>{
    if(tab==="hires"&&user){
      setHiresLoading(true);
      supabase.from("hire_requests").select("*").eq("customer_user_id",user.id).order("created_at",{ascending:false})
        .then(({data})=>{setHires(data||[]);setHiresLoading(false);});
    }
    if(tab==="provider"&&user){
      setProvLoading(true);
      supabase.from("providers").select("*").eq("email",user.email).maybeSingle()
        .then(({data})=>{setMyProvider(data);setProvLoading(false);});
    }
  },[tab,user]);

  if(!user)return(
    <div style={{textAlign:"center",padding:"80px 20px 120px"}}>
      <div style={{fontSize:54,marginBottom:16}}>👤</div>
      <h2 style={{fontSize:20,fontWeight:800,color:C.dark,marginBottom:12}}>Sign in to access your account</h2>
      <div style={{display:"flex",gap:12,justifyContent:"center"}}>
        <Btn v="primary" onClick={()=>setPage("login")}>{t("login")}</Btn>
        <Btn v="green" onClick={()=>setPage("signup")}>{t("joinFree")}</Btn>
      </div>
    </div>
  );

  const pickAvatar=(e)=>{
    const f=e.target.files[0];
    if(!f)return;
    if(f.size>3*1024*1024){setErr("Image must be under 3 MB.");return;}
    setAvatarFile(f);
    const r=new FileReader();
    r.onload=ev=>setAvatarPreview(ev.target.result);
    r.readAsDataURL(f);
  };

  const saveProfile=async()=>{
    setSaving(true);setErr("");setMsg("");
    let updates={full_name:name.trim()};
    if(avatarFile){
      const ext=avatarFile.name.split(".").pop();
      const path=`avatars/${user.id}.${ext}`;
      const{error:upErr}=await supabase.storage.from("avatars").upload(path,avatarFile,{upsert:true});
      if(upErr){setErr("Photo upload failed: "+upErr.message);setSaving(false);return;}
      const{data:pd}=supabase.storage.from("avatars").getPublicUrl(path);
      updates.avatar_url=pd.publicUrl+"?t="+Date.now();
    }
    const{data,error}=await supabase.auth.updateUser({data:updates});
    if(error){setErr(error.message);setSaving(false);return;}
    setUser(data.user);
    setAvatarFile(null);
    setAvatarPreview(data.user?.user_metadata?.avatar_url||avatarPreview);
    setSaving(false);
    setMsg("✅ Profile updated!");
    setTimeout(()=>setMsg(""),3000);
  };

  const changePass=async()=>{
    setPassErr("");setPassMsg("");
    if(!np||!np2){setPassErr("Fill in both password fields.");return;}
    if(np!==np2){setPassErr(t("passError"));return;}
    if(np.length<6){setPassErr("Password must be at least 6 characters.");return;}
    const{error}=await supabase.auth.updateUser({password:np});
    if(error){setPassErr(error.message);return;}
    setPassMsg("✅ "+t("passChanged"));
    setCp("");setNp("");setNp2("");
    setTimeout(()=>setPassMsg(""),3500);
  };

  const deleteAcc=async()=>{
    if(delConfirm!=="DELETE")return;
    // sign out then show message — actual deletion needs server-side
    await supabase.auth.signOut();
    setUser(null);
    setPage("home");
    alert(t("accountDeleted"));
  };

  const email=user.email;
  const joined=new Date(user.created_at).toLocaleDateString("en-RW",{year:"numeric",month:"long",day:"numeric"});
  const verified=!!user.email_confirmed_at;
  const isAdmin=user.email===ADMIN_EMAIL;

  const tabs=[
    {k:"profile",ic:"👤",lb:"Profile"},
    {k:"hires",ic:"🤝",lb:t("myHires")},
    {k:"provider",ic:"👷",lb:t("myProvider")},
    {k:"settings",ic:"⚙️",lb:t("accountSettings")},
  ];

  return(
    <div className="fade-in" style={{maxWidth:600,margin:"0 auto",padding:"28px 20px 120px"}}>
      {/* Header card */}
      <div style={{background:`linear-gradient(135deg,${C.navy},#1e3a6e)`,borderRadius:20,padding:"26px 24px",marginBottom:20,color:"#fff",textAlign:"center"}}>

          {avatarPreview?(

            <Inp label={t("confirmPass")} ph="••••••••" val={np2} onChange={e=>setNp2(e.target.value)} type="password"/>
            {passErr&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:"10px 14px",fontSize:13,color:"#dc2626"}}>{passErr}</div>}

            <Btn v="primary" onClick={changePass} style={{width:"100%",justifyContent:"center"}}>{t("updatePass")}</Btn>
          </Card>
          {/* Logout */}
          <Card>
            <h3 style={{fontWeight:700,fontSize:15,color:C.dark,marginBottom:12}}>🚪 Sign Out</h3>
            <Btn v="outline" onClick={async()=>{await supabase.auth.signOut();setUser(null);setPage("home");}} style={{width:"100%",justifyContent:"center"}}>{t("logout")}</Btn>

const AdminPage=({user})=>{

    if(!user||user.email!==ADMIN_EMAIL)return;
    const load=async()=>{
      setLoading(true);
      const[{data:p},{data:h}]=await Promise.all([
        supabase.from("providers").select("*").order("created_at",{ascending:false}),
        supabase.from("hire_requests").select("*").order("created_at",{ascending:false}),

      <div style={{display:"flex",gap:8,marginBottom:22,flexWrap:"wrap"}}>

          <button key={k} onClick={()=>setTab(k)}

            {ic} {lb}

      {loading?<Spinner/>:(

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:16}}>
              {[

// ── AUTH PAGE — signup with profile pic + real email verify + wrong pass blocked
const AuthPage=({mode,setPage,setUser})=>{
  const{t}=useLang();
  const[email,setEmail]=useState("");
  const[pass,setPass]=useState("");
  const[name,setName]=useState("");
  const[showPass,setShowPass]=useState(false);
  const[avatarFile,setAvatarFile]=useState(null);
  const[avatarPreview,setAvatarPreview]=useState(null);
  const[err,setErr]=useState("");
  const[loading,setLoading]=useState(false);
  const[verifyMsg,setVerifyMsg]=useState(false);
  const fileRef=useRef();
  const isL=mode==="login";

  const pickAvatar=(e)=>{
    const f=e.target.files[0];
    if(!f)return;
    if(f.size>3*1024*1024){setErr("Image must be under 3 MB.");return;}
    setAvatarFile(f);
    const r=new FileReader();
    r.onload=ev=>setAvatarPreview(ev.target.result);
    r.readAsDataURL(f);
  };

  const uploadAv=async(uid)=>{
    if(!avatarFile)return null;
    const ext=avatarFile.name.split(".").pop();
    const path=`avatars/${uid}.${ext}`;
    const{error}=await supabase.storage.from("avatars").upload(path,avatarFile,{upsert:true});
    if(error)return null;
    const{data}=supabase.storage.from("avatars").getPublicUrl(path);
    return data.publicUrl;
  };

  const go=async()=>{
    if(!email||!pass){setErr("Please fill in all fields.");return;}
    if(!isL&&!name.trim()){setErr("Please enter your full name.");return;}
    if(!isL&&pass.length<6){setErr("Password must be at least 6 characters.");return;}
    setErr("");setLoading(true);

    if(isL){
      const{data,error}=await supabase.auth.signInWithPassword({email,password:pass});
      if(error){
        const m=error.message.toLowerCase();
        if(m.includes("invalid login")||m.includes("invalid credentials")||m.includes("invalid")){
          setErr("❌ Wrong email or password. Please check and try again.");
        } else if(m.includes("email not confirmed")){
          setErr("📧 Please verify your email first. Check your inbox for a confirmation link.");
        } else {
          setErr(error.message);
        }
        setLoading(false);return;
      }
      if(!data.user.email_confirmed_at){
        await supabase.auth.signOut();
        setErr("📧 Your email isn't verified yet. Please click the link we sent to your inbox, then try logging in again.");
        setLoading(false);return;
      }
      setUser(data.user);
      setPage("home");
    } else {
      const{data,error}=await supabase.auth.signUp({email,password:pass,options:{data:{full_name:name.trim()}}});
      if(error){setErr(error.message);setLoading(false);return;}
      if(avatarFile&&data.user){
        const url=await uploadAv(data.user.id);
        if(url)await supabase.auth.updateUser({data:{avatar_url:url}});
      }
      setVerifyMsg(true);
    }
    setLoading(false);
  };

  return(
    <div className="fade-in" style={{maxWidth:420,margin:"40px auto",padding:"0 20px 120px"}}>
      <div style={{textAlign:"center",marginBottom:20}}>
        <Logo size="lg"/>
      </div>
      <Card>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{fontSize:36,marginBottom:8}}>{isL?"🔐":"✨"}</div>
          <h1 style={{fontSize:20,fontWeight:800,color:C.dark,marginBottom:4}}>{t(isL?"loginTitle":"signupTitle")}</h1>
          <p style={{color:C.gray,fontSize:13}}>{t(isL?"loginSub":"signupSub")}</p>
        </div>

        {verifyMsg?(
          <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:14,padding:"24px 20px",textAlign:"center"}}>
            <div style={{fontSize:44,marginBottom:12}}>📧</div>
            <div style={{fontWeight:800,fontSize:16,color:"#15803d",marginBottom:8}}>Check your inbox!</div>
            <div style={{fontSize:13,color:"#166534",lineHeight:1.7,marginBottom:18}}>
              We sent a verification link to<br/><strong>{email}</strong><br/>
              Click it to activate your account, then sign in.
            </div>
            <Btn v="primary" style={{width:"100%",justifyContent:"center"}} onClick={()=>setPage("login")}>Go to Login →</Btn>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            {/* Avatar picker on signup */}
            {!isL&&(
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
                <div onClick={()=>fileRef.current.click()} style={{cursor:"pointer",position:"relative"}}>
                  {avatarPreview?(
                    <img src={avatarPreview} alt="preview" style={{width:80,height:80,borderRadius:"50%",objectFit:"cover",border:`3px solid ${C.navy}`}}/>
                  ):(
                    <div style={{width:80,height:80,borderRadius:"50%",background:`linear-gradient(135deg,#e2e8f0,#f1f5f9)`,
                      display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,border:`3px dashed ${C.grayLight}`}}>👤</div>
                  )}
                  <div style={{position:"absolute",bottom:0,right:0,background:C.navy,borderRadius:"50%",width:24,height:24,
                    display:"flex",alignItems:"center",justifyContent:"center",border:"2px solid #fff",fontSize:11}}>➕</div>
                </div>
                <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={pickAvatar}/>
                <span style={{fontSize:11,color:C.gray}}>{t("tapToChange")} (optional)</span>
              </div>
            )}

            {!isL&&<Inp label={t("nameL")} ph="Jean Claude Habimana" val={name} onChange={e=>setName(e.target.value)} req/>}
            <Inp label={t("emailL")} ph="email@example.com" val={email} onChange={e=>setEmail(e.target.value)} type="email" req/>

            {/* Password with show/hide */}
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              <label style={{fontSize:13,fontWeight:600,color:C.dark}}>{t("passL")} <span style={{color:"#ef4444"}}>*</span></label>
              <div style={{position:"relative"}}>
                <input value={pass} onChange={e=>setPass(e.target.value)} type={showPass?"text":"password"} placeholder="••••••••"
                  style={{width:"100%",padding:"10px 42px 10px 14px",borderRadius:10,border:`1.5px solid ${C.grayLight}`,
                    fontFamily:"Poppins",fontSize:14,color:C.dark,outline:"none"}}
                  onFocus={e=>e.target.style.borderColor=C.navy}
                  onBlur={e=>e.target.style.borderColor=C.grayLight}/>
                <button onClick={()=>setShowPass(s=>!s)} type="button"
                  style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",
                    background:"none",border:"none",cursor:"pointer",fontSize:16,color:C.gray}}>
                  {showPass?"🙈":"👁️"}
                </button>
              </div>
              {!isL&&<span style={{fontSize:11,color:C.gray}}>Minimum 6 characters</span>}
            </div>

            {err&&(
              <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:"12px 14px",fontSize:13,color:"#dc2626",lineHeight:1.6}}>
                {err}
              </div>
            )}

            <Btn v="primary" sz="lg" onClick={go} disabled={loading} style={{width:"100%",justifyContent:"center"}}>
              {loading?(
                <span style={{display:"flex",alignItems:"center",gap:8}}>

// ── REGISTER PAGE ─────────────────────────────────────────────────────────────
const RegisterPage=({setPage,user})=>{
  const{t,lang}=useLang();
  const[f,setF]=useState({name:"",phone:"",location:"",service_id:"",price:"",bio:""});
  const[done,setDone]=useState(false);
  const[err,setErr]=useState("");
  const[saving,setSaving]=useState(false);
  const s=(k,v)=>setF(x=>({...x,[k]:v}));
  const submit=async()=>{
    if(!f.name||!f.phone||!f.location||!f.service_id||!f.price){setErr(t("fError"));return;}
    setErr("");setSaving(true);
    const{error}=await supabase.from("providers").insert([{
      name:f.name,phone:f.phone,location:f.location,
      service_id:f.service_id,price:f.price,bio:f.bio,
      available:true,badge:"new",rating:0,jobs:0,
      email:user?user.email:null,
    }]);
    setSaving(false);
    if(error)setErr("Error: "+error.message);
    else setDone(true);
  };
  const catOpts=[{v:"",l:lang==="rw"?"— Hitamo ubwoko —":"— Select service —"},...CATS.map(c=>({v:c.id,l:lang==="rw"?c.rw:c.en}))];
  const distOpts=[{v:"",l:lang==="rw"?"— Hitamo akarere —":"— Select district —"},...DISTRICTS.map(d=>({v:d,l:d}))];
  return(
    <div className="fade-in" style={{maxWidth:580,margin:"0 auto",padding:"38px 20px 120px"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:46,marginBottom:10}}>👷</div>
        <h1 style={{fontSize:24,fontWeight:800,color:C.dark,marginBottom:8}}>{t("regTitle")}</h1>
        <p style={{color:C.gray,fontSize:14,lineHeight:1.6}}>{t("regSub")}</p>
      </div>
      {done?(
        <Card style={{textAlign:"center",padding:"38px 22px"}}>
          <div style={{fontSize:54,marginBottom:12}}>🎉</div>
          <p style={{fontSize:15,fontWeight:600,color:C.green,lineHeight:1.7}}>{t("fSuccess")}</p>
          <Btn v="primary" style={{marginTop:20}} onClick={()=>{setDone(false);setPage("home");}}>{t("backHome")}</Btn>
        </Card>
      ):(
        <Card style={{display:"flex",flexDirection:"column",gap:16}}>
          <Inp label={t("fName")} ph={t("fNamePh")} val={f.name} onChange={e=>s("name",e.target.value)} req/>
          <Inp label={t("fPhone")} ph={t("fPhonePh")} val={f.phone} onChange={e=>s("phone",e.target.value)} type="tel" req/>
          <Sel label={t("fLoc")} val={f.location} onChange={e=>s("location",e.target.value)} opts={distOpts} req/>
          <Sel label={t("fService")} val={f.service_id} onChange={e=>s("service_id",e.target.value)} opts={catOpts} req/>
          <Inp label={t("fPrice")} ph={t("fPricePh")} val={f.price} onChange={e=>s("price",e.target.value)} type="number" req hint="RWF per hour"/>
          <div style={{display:"flex",flexDirection:"column",gap:5}}>
            <label style={{fontSize:13,fontWeight:600,color:C.dark}}>{t("fBio")}</label>
            <textarea value={f.bio} onChange={e=>s("bio",e.target.value.slice(0,200))} placeholder={t("fBioPh")} maxLength={200}
              style={{padding:"10px 14px",borderRadius:10,border:`1.5px solid ${C.grayLight}`,fontFamily:"Poppins",fontSize:14,color:C.dark,resize:"vertical",minHeight:88,outline:"none"}}/>
            <span style={{fontSize:11,color:C.gray,textAlign:"right"}}>{f.bio.length}/200</span>
          </div>
          {err&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:"10px 14px",fontSize:13,color:"#dc2626"}}>{err}</div>}

  );

function App(){
  const[lang,setLang]=useState(()=>localStorage.getItem("rch_lang")||"en");
  const[page,setPage]=useState("home");
  const[user,setUser]=useState(null);
  const[langPanel,setLangPanel]=useState(false);
  const[unreadCount,setUnreadCount]=useState(0);

  useEffect(()=>{
    supabase.auth.getSession().then(({data:{session}})=>{
      if(session?.user)setUser(session.user);
    });
    const{data:{subscription}}=supabase.auth.onAuthStateChange((_,session)=>{
      setUser(session?.user||null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(!user)return;
    const isAdmin=user.email===ADMIN_EMAIL;
    const fetch=async()=>{
      let q=supabase.from("hire_requests").select("id",{count:"exact"}).eq("read",false);
      if(!isAdmin)q=q.eq("provider_email",user.email);
      const{count}=await q;
      setUnreadCount(count||0);
    };
    fetch();
    const ch=supabase.channel("uc").on("postgres_changes",{event:"*",schema:"public",table:"hire_requests"},fetch).subscribe();
    return()=>supabase.removeChannel(ch);
  },[user]);

  const handleLang=(l)=>{localStorage.setItem("rch_lang",l);setLang(l);};
  const t=(k)=>TR[lang]?.[k]||TR["en"]?.[k]||k;

  return(
    <LC.Provider value={{lang,t,setLang:handleLang}}>
      <LangPanel open={langPanel} onClose={()=>setLangPanel(false)} lang={lang} setLang={handleLang}/>
      <TopNav setPage={setPage} user={user} setUser={setUser} onLang={()=>setLangPanel(true)} unreadCount={unreadCount}/>
      <main style={{minHeight:"70vh"}}>
        {page==="home"          &&<HomePage setPage={setPage} user={user}/>}
        {page==="services"      &&<ServicesPage setPage={setPage} user={user}/>}
        {page==="register"      &&<RegisterPage setPage={setPage} user={user}/>}
        {page==="login"         &&<AuthPage mode="login" setPage={setPage} setUser={setUser}/>}
        {page==="signup"        &&<AuthPage mode="signup" setPage={setPage} setUser={setUser}/>}
        {page==="notifications" &&<NotifPage user={user}/>}
        {page==="account"       &&<AccountPage user={user} setUser={setUser} setPage={setPage}/>}
        {page==="admin"         &&<AdminPage user={user}/>}
      </main>
      <Footer/>
      <BotNav page={page} setPage={setPage} user={user} unreadCount={unreadCount}/>
      <WABtn/>
    </LC.Provider>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
